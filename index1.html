<!-- <!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Digital Flower (Standalone)</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #07040f;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      display: block;
      z-index: 0;
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <script>
    // ── Standalone Digital Flower Canvas ──
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, cx, cy;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cx = W / 2; cy = H / 2;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Particles ──
    const particles = [];
    for (let i = 0; i < 120; i++) {
      particles.push({
        x: Math.random() * 2000 - 1000,
        y: Math.random() * 2000 - 1000,
        r: Math.random() * 2 + 0.5,
        speed: Math.random() * 0.3 + 0.1,
        angle: Math.random() * Math.PI * 2,
        opacity: Math.random() * 0.7 + 0.2,
        color: ['#f9a8d4', '#c084fc', '#818cf8', '#fbcfe8', '#e879f9'][Math.floor(Math.random() * 5)]
      });
    }

    // ── Petal drawing ──
    function drawPetalSimple(cx, cy, len, wid, angle, c1, c2, alpha) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      const grad = ctx.createLinearGradient(0, 0, 0, len);
      grad.addColorStop(0, hexAlpha(c1, alpha));
      grad.addColorStop(1, hexAlpha(c2, 0));
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(wid, len * 0.25, wid * 1.1, len * 0.65, 0, len);
      ctx.bezierCurveTo(-wid * 1.1, len * 0.65, -wid, len * 0.25, 0, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      // shimmer line
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(wid * 0.15, len * 0.5, 0, len);
      ctx.strokeStyle = hexAlpha('#ffffff', alpha * 0.18);
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }

    function hexAlpha(hex, a) {
      let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${a})`;
    }

    // ── Leaf ──
    function drawLeaf(cx, cy, len, wid, angle, alpha) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      const grad = ctx.createLinearGradient(0, 0, 0, len);
      grad.addColorStop(0, `rgba(110,231,183,${alpha})`);
      grad.addColorStop(0.5, `rgba(52,211,153,${alpha * 0.8})`);
      grad.addColorStop(1, `rgba(16,185,129,0)`);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(wid, len * 0.3, wid * 0.8, len * 0.7, 0, len);
      ctx.bezierCurveTo(-wid * 0.8, len * 0.7, -wid, len * 0.3, 0, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    }

    // ── Stem ──
    function drawStem(cx, cy, len, alpha) {
      const grad = ctx.createLinearGradient(cx, cy, cx, cy + len);
      grad.addColorStop(0, `rgba(52,211,153,${alpha})`);
      grad.addColorStop(1, `rgba(16,185,129,${alpha * 0.3})`);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.quadraticCurveTo(cx - 18, cy + len * 0.55, cx - 8, cy + len);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 4 * alpha;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // ── Bloom animation state ──
    let t = 0;
    const BLOOM_DURATION = 240; // frames

    // petal layers config
    const petalLayers = [
      { count: 8, lenBase: 130, wid: 36, c1: '#e879f9', c2: '#c084fc', offset: 0 },
      { count: 7, lenBase: 100, wid: 28, c1: '#f9a8d4', c2: '#e879f9', offset: Math.PI / 8 },
      { count: 6, lenBase: 68, wid: 20, c1: '#fde68a', c2: '#f9a8d4', offset: 0 },
      { count: 5, lenBase: 42, wid: 13, c1: '#ffffff', c2: '#fde68a', offset: Math.PI / 10 },
    ];

    function drawFlower(progress) {
      const p = Math.min(progress, 1);
      const eased = p < 0.5 ? 2 * p * p : -1 + (4 - 2 * p) * p;

      drawStem(cx, cy + 20, 140 * eased, eased);
      
      if (eased > 0.3) {
        const la = (eased - 0.3) / 0.7;
        drawLeaf(cx - 4, cy + 80, 60 * la, 18 * la, Math.PI * 0.35 + Math.sin(t * 0.02) * 0.03, la);
        drawLeaf(cx - 4, cy + 110, 45 * la, 14 * la, -Math.PI * 0.45 + Math.sin(t * 0.02 + 1) * 0.03, la);
      }

      if (eased < 0.15) return;
      const fe = (eased - 0.15) / 0.85;

      petalLayers.forEach((layer, li) => {
        const layerDelay = li * 0.18;
        const lp = Math.max(0, Math.min(1, (fe - layerDelay) / (1 - layerDelay)));
        const eL = lp < 0.5 ? 2 * lp * lp : -1 + (4 - 2 * lp) * lp;
        if (eL <= 0) return;
        for (let i = 0; i < layer.count; i++) {
          const angle = (i / layer.count) * Math.PI * 2 + layer.offset + t * 0.003 * (li % 2 === 0 ? 1 : -1);
          const len = layer.lenBase * eL;
          const wid = layer.wid * eL;
          drawPetalSimple(cx, cy, len, wid, angle, layer.c1, layer.c2, eL * 0.92);
        }
      });

      if (fe > 0.3) {
        const ga = (fe - 0.3) / 0.7;
        const pulse = 1 + Math.sin(t * 0.06) * 0.08;
        const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30 * ga * pulse);
        rg.addColorStop(0, `rgba(255,255,220,${ga * 0.98})`);
        rg.addColorStop(0.4, `rgba(253,230,138,${ga * 0.8})`);
        rg.addColorStop(0.75, `rgba(249,168,212,${ga * 0.4})`);
        rg.addColorStop(1, 'rgba(249,168,212,0)');
        ctx.beginPath();
        ctx.arc(cx, cy, 30 * ga * pulse, 0, Math.PI * 2);
        ctx.fillStyle = rg;
        ctx.fill();

        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2 + t * 0.04;
          const r = 12 * ga * pulse;
          ctx.beginPath();
          ctx.arc(cx + Math.cos(a) * r, cy + Math.sin(a) * r, 2 * ga, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,245,180,${ga * 0.9})`;
          ctx.fill();
        }
      }
    }

    // ── glow background ──
    function drawBackground() {
      ctx.fillStyle = '#07040f';
      ctx.fillRect(0, 0, W, H);
      const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 340);
      rg.addColorStop(0, 'rgba(120,60,180,0.18)');
      rg.addColorStop(0.5, 'rgba(80,20,120,0.08)');
      rg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);
    }

    // ── particles ──
    function drawParticles() {
      particles.forEach(p => {
        p.angle += p.speed * 0.01;
        const dist = Math.sqrt(p.x * p.x + p.y * p.y);
        const spiral = 0.002 / Math.max(dist, 50);
        p.angle += spiral;
        p.x = Math.cos(p.angle) * dist + Math.cos(t * p.speed * 0.1) * 0.5;
        p.y = Math.sin(p.angle) * dist + Math.sin(t * p.speed * 0.1) * 0.5;
        const nx = p.x * 0.9998, ny = p.y * 0.9998;
        if (Math.abs(nx) < 2 && Math.abs(ny) < 2) {
          p.x = Math.random() * 800 - 400;
          p.y = Math.random() * 800 - 400;
        } else { p.x = nx; p.y = ny; }
        ctx.beginPath();
        ctx.arc(cx + p.x, cy + p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + Math.floor(p.opacity * 255).toString(16).padStart(2, '0');
        ctx.fill();
      });
    }

    // ── aura rings ──
    function drawAura(progress) {
      if (progress < 0.3) return;
      const a = (progress - 0.3) / 0.7;
      for (let i = 0; i < 3; i++) {
        const phase = t * 0.015 + i * (Math.PI * 2 / 3);
        const r = 90 + i * 30 + Math.sin(phase) * 6;
        ctx.beginPath();
        ctx.arc(cx, cy, r * Math.min(a * 2, 1), 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(192,132,252,${0.06 * a})`;
        ctx.lineWidth = i === 0 ? 2 : 1;
        ctx.stroke();
      }
    }

    // ── main loop ──
    function loop() {
      t++;
      const progress = t / BLOOM_DURATION;
      drawBackground();
      drawParticles();
      drawAura(progress);
      drawFlower(progress);
      requestAnimationFrame(loop);
    }
    
    // Start animation immediately
    loop();
  </script>
</body>
