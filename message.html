<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Akane — A Letter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #07040f;
            font-family: 'Inter', sans-serif;
            color: #f0e8ff;
        }

        /* canvas layers */
        #bg-canvas,
        #flower-canvas,
        #spark-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        #bg-canvas {
            z-index: 0;
        }

        #flower-canvas {
            z-index: 1;
            pointer-events: none;
            opacity: 0.35;
        }

        #spark-canvas {
            z-index: 2;
            pointer-events: none;
        }

        /* page layout */
        #page {
            position: fixed;
            inset: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1.5rem 6.5rem;
        }

        /* letter card */
        .letter-card {
            position: relative;
            width: min(580px, 94vw);
            max-height: calc(100vh - 9rem);
            overflow-y: auto;
            background: rgba(10, 4, 22, 0.82);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(192, 132, 252, 0.22);
            border-radius: 22px;
            padding: 2.8rem 3rem;
            box-shadow:
                0 0 80px rgba(192, 132, 252, 0.18),
                0 0 0 1px rgba(249, 168, 212, 0.06) inset,
                0 24px 70px rgba(0, 0, 0, 0.6);
            scrollbar-width: thin;
            scrollbar-color: rgba(192, 132, 252, 0.3) transparent;
        }

        .letter-card::-webkit-scrollbar {
            width: 4px;
        }

        .letter-card::-webkit-scrollbar-thumb {
            background: rgba(192, 132, 252, 0.3);
            border-radius: 4px;
        }

        /* top accent line */
        .letter-card::before {
            content: '';
            display: block;
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, #e879f9, #c084fc, #818cf8);
            border-radius: 2px;
            margin: 0 auto 2rem;
        }

        /* transitions */
        .letter-card {
            transition: opacity 0.28s ease, transform 0.28s ease;
        }

        .letter-card.out {
            opacity: 0;
            transform: translateX(-28px) scale(0.97);
        }

        .letter-card.out-rev {
            opacity: 0;
            transform: translateX(28px) scale(0.97);
        }

        /* typography */
        .letter-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
        }

        .letter-tag {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: #c084fc;
            font-weight: 500;
        }

        .letter-date {
            font-size: 0.68rem;
            color: #6b5d8a;
            letter-spacing: 0.04em;
        }

        .letter-salutation {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1rem, 2.5vw, 1.18rem);
            color: #f9a8d4;
            margin-bottom: 1.4rem;
        }

        .letter-body {
            font-family: 'Playfair Display', serif;
            font-size: clamp(0.95rem, 2.2vw, 1.1rem);
            line-height: 2;
            color: #e2d9f3;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .letter-closing {
            margin-top: 2rem;
            text-align: right;
        }

        .letter-closing p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(0.9rem, 2vw, 1.05rem);
            color: #c084fc;
            line-height: 1.8;
        }

        .letter-closing .sig {
            color: #f9a8d4;
            font-size: clamp(1rem, 2.4vw, 1.2rem);
            margin-top: 0.3rem;
        }

        .deco-heart {
            text-align: center;
            font-size: 1.4rem;
            margin-top: 1.8rem;
            animation: hb 2.2s ease-in-out infinite;
            filter: drop-shadow(0 0 14px rgba(249, 168, 212, 0.6));
        }

        @keyframes hb {

            0%,
            100% {
                transform: scale(1);
            }

            20% {
                transform: scale(1.14);
            }

            40% {
                transform: scale(0.96);
            }

            60% {
                transform: scale(1.07);
            }
        }

        /* nav */
        .nav {
            position: fixed;
            bottom: 1.8rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(10, 4, 20, 0.74);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(192, 132, 252, 0.2);
            border-radius: 60px;
            padding: 0.55rem 1.2rem;
            box-shadow: 0 4px 28px rgba(0, 0, 0, 0.5), 0 0 36px rgba(192, 132, 252, 0.1);
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 0.36rem;
            background: none;
            border: none;
            color: #9a89b4;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 0.38rem 0.6rem;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
        }

        .nav-btn svg {
            width: 15px;
            height: 15px;
        }

        .nav-btn:hover {
            color: #c084fc;
            background: rgba(192, 132, 252, 0.1);
        }

        .nav-btn:disabled {
            opacity: 0.22;
            cursor: not-allowed;
            background: none;
        }

        .dots {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #9a89b4;
            opacity: 0.32;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.3s, background 0.3s;
        }

        .dot.active {
            opacity: 1;
            background: #c084fc;
            transform: scale(1.5);
            box-shadow: 0 0 9px #c084fc;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            #page {
                padding: 1rem 1rem 5.5rem;
            }

            .letter-card {
                padding: 2rem 1.8rem;
                border-radius: 18px;
            }

            .letter-salutation {
                font-size: clamp(0.95rem, 3.5vw, 1.1rem);
            }

            .letter-body {
                font-size: clamp(0.9rem, 3vw, 1rem);
                line-height: 1.9;
            }

            .nav {
                gap: 0.7rem;
                padding: 0.5rem 0.9rem;
                bottom: 1.2rem;
            }

            .nav-btn {
                font-size: 0.72rem;
                padding: 0.35rem 0.45rem;
            }

            .dots {
                gap: 6px;
            }
        }

        @media (max-width: 480px) {
            #page {
                padding: 0.8rem 0.8rem 5rem;
            }

            .letter-card {
                padding: 1.6rem 1.2rem;
                border-radius: 14px;
                max-height: calc(100vh - 7.5rem);
            }

            .letter-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.2rem;
                margin-bottom: 1.2rem;
            }

            .letter-salutation {
                font-size: 0.95rem;
                margin-bottom: 1rem;
            }

            .letter-body {
                font-size: 0.88rem;
                line-height: 1.85;
            }

            .letter-closing p {
                font-size: 0.85rem;
            }

            .letter-closing .sig {
                font-size: 0.95rem;
            }

            .deco-heart {
                font-size: 1.2rem;
                margin-top: 1.2rem;
            }

            .nav {
                gap: 0.4rem;
                padding: 0.4rem 0.7rem;
                bottom: 0.9rem;
            }

            .nav-btn {
                font-size: 0.65rem;
                gap: 0.2rem;
                padding: 0.3rem 0.35rem;
            }

            .nav-btn svg {
                width: 13px;
                height: 13px;
            }

            .dots {
                gap: 5px;
            }

            .dot {
                width: 5px;
                height: 5px;
            }
        }

        @media (max-width: 360px) {
            .letter-card {
                padding: 1.2rem 0.9rem;
            }

            .letter-body {
                font-size: 0.84rem;
            }

            .nav {
                gap: 0.25rem;
                padding: 0.35rem 0.55rem;
            }

            .nav-btn {
                font-size: 0.6rem;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            #page {
                padding: 0.4rem 1rem 4rem;
            }

            .letter-card {
                max-height: calc(100vh - 5rem);
                padding: 1rem 1.2rem;
            }

            .letter-salutation {
                margin-bottom: 0.7rem;
            }

            .deco-heart {
                margin-top: 0.8rem;
            }

            .nav {
                bottom: 0.5rem;
            }
        }
    </style>
</head>

        // ══════════════════════════════════════
        //  BACKGROUND — ambient sparkles
        // ══════════════════════════════════════
        const bgC = document.getElementById('bg-canvas');
        const bgX = bgC.getContext('2d');
        const flC = document.getElementById('flower-canvas');
        const flX = flC.getContext('2d');
        const spC = document.getElementById('spark-canvas');
        const spX = spC.getContext('2d');
        let W, H, MX, MY;

        function resize() {
            W = bgC.width = flC.width = spC.width = window.innerWidth;
            H = bgC.height = flC.height = spC.height = window.innerHeight;
            MX = W / 2; MY = H / 2;
        }
        resize();
        window.addEventListener('resize', resize);

        function hexA(hex, a) {
            return `rgba(${parseInt(hex.slice(1, 3), 16)},${parseInt(hex.slice(3, 5), 16)},${parseInt(hex.slice(5, 7), 16)},${a})`;
        }

        const COLS = ['#f9a8d4', '#c084fc', '#818cf8', '#fde68a', '#e879f9', '#a78bfa'];
        const sparks = Array.from({ length: 110 }, () => ({
            angle: Math.random() * Math.PI * 2,
            dist: Math.random() * 440 + 50,
            r: Math.random() * 1.8 + 0.3,
            drift: Math.random() * 0.005 + 0.001,
            op: Math.random() * 0.5 + 0.15,
            ts: Math.random() * 0.05 + 0.01,
            to: Math.random() * Math.PI * 2,
            col: COLS[Math.floor(Math.random() * COLS.length)]
        }));

        // ══════════════════════════════════════
        //  FLOWER SYSTEM (10 flowers)
        // ══════════════════════════════════════
        const BLOOM_FRAMES = 260;

        function drawPetal(x, y, len, wid, angle, c1, c2, alpha) {
            flX.save();
            flX.translate(x, y);
            flX.rotate(angle);
            const grad = flX.createLinearGradient(0, 0, 0, len);
            grad.addColorStop(0, hexA(c1, alpha));
            grad.addColorStop(0.6, hexA(c1, alpha * 0.6));
            grad.addColorStop(1, hexA(c2, 0));
            flX.beginPath();
            flX.moveTo(0, 0);
            flX.bezierCurveTo(wid, len * 0.22, wid * 1.15, len * 0.65, 0, len);
            flX.bezierCurveTo(-wid * 1.15, len * 0.65, -wid, len * 0.22, 0, 0);
            flX.closePath();
            flX.fillStyle = grad;
            flX.fill();
            // shimmer vein
            flX.beginPath();
            flX.moveTo(0, len * 0.05);
            flX.quadraticCurveTo(wid * 0.12, len * 0.5, 0, len * 0.92);
            flX.strokeStyle = hexA('#ffffff', alpha * 0.22);
            flX.lineWidth = 0.9;
            flX.stroke();
            flX.restore();
        }

        function drawLeafF(x, y, len, wid, angle, alpha) {
            flX.save();
            flX.translate(x, y);
            flX.rotate(angle);
            const grad = flX.createLinearGradient(0, 0, 0, len);
            grad.addColorStop(0, `rgba(110,231,183,${alpha})`);
            grad.addColorStop(0.5, `rgba(52,211,153,${alpha * 0.75})`);
            grad.addColorStop(1, `rgba(16,185,129,0)`);
            flX.beginPath();
            flX.moveTo(0, 0);
            flX.bezierCurveTo(wid, len * 0.28, wid * 0.75, len * 0.72, 0, len);
            flX.bezierCurveTo(-wid * 0.75, len * 0.72, -wid, len * 0.28, 0, 0);
            flX.closePath();
            flX.fillStyle = grad;
            flX.fill();
            flX.restore();
        }

        function drawStemF(x, y, len, alpha) {
            const grad = flX.createLinearGradient(x, y, x, y + len);
            grad.addColorStop(0, `rgba(52,211,153,${alpha})`);
            grad.addColorStop(1, `rgba(16,185,129,${alpha * 0.3})`);
            flX.beginPath();
            flX.moveTo(x, y);
            flX.quadraticCurveTo(x - 14, y + len * 0.55, x - 6, y + len);
            flX.strokeStyle = grad;
            flX.lineWidth = 4 * alpha;
            flX.lineCap = 'round';
            flX.stroke();
        }

        function easeIO(x) { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2; }

        const FLOWERS = [

              ], glow: '204,251,241', glow2: '153,246,228', glow3: '45,212,191', dot: '204,251,241',
              leaves: [{ oX: -2, oY: 42, l: 28, w: 9, a: Math.PI * 0.38, sw: 0.7 }, { oX: 3, oY: 56, l: 22, w: 7, a: -Math.PI * 0.35, sw: 1.4 }]
            },
            { getX: () => MX + W * 0.18, getY: () => MY + H * 0.25, scale: 0.35, bloomDelay: 200, stemLen: 70,
              layers: [
                { count: 6, lenBase: 100, wid: 26, c1: '#d8b4fe', c2: '#a78bfa', offset: 0 },
                { count: 5, lenBase: 70, wid: 18, c1: '#e9d5ff', c2: '#d8b4fe', offset: Math.PI / 6 },
                { count: 5, lenBase: 46, wid: 13, c1: '#f3e8ff', c2: '#e9d5ff', offset: 0 },
                { count: 4, lenBase: 28, wid: 8, c1: '#faf5ff', c2: '#f3e8ff', offset: Math.PI / 7 },
              ], glow: '250,245,255', glow2: '233,213,255', glow3: '216,180,254', dot: '243,232,255',
              leaves: [{ oX: -3, oY: 40, l: 26, w: 8, a: Math.PI * 0.33, sw: 0.9 }, { oX: 2, oY: 52, l: 20, w: 7, a: -Math.PI * 0.44, sw: 1.6 }]
            },
            { getX: () => MX - W * 0.35, getY: () => MY + H * 0.05, scale: 0.32, bloomDelay: 150, stemLen: 65,
              layers: [
                { count: 6, lenBase: 95, wid: 25, c1: '#e879f9', c2: '#d946ef', offset: 0 },
                { count: 5, lenBase: 66, wid: 17, c1: '#f0abfc', c2: '#e879f9', offset: Math.PI / 5 },
                { count: 4, lenBase: 44, wid: 12, c1: '#f5d0fe', c2: '#f0abfc', offset: 0 },
                { count: 4, lenBase: 26, wid: 8, c1: '#fae8ff', c2: '#f5d0fe', offset: Math.PI / 8 },
              ], glow: '250,232,255', glow2: '245,208,254', glow3: '232,121,249', dot: '250,232,255',
              leaves: [{ oX: -2, oY: 38, l: 24, w: 8, a: Math.PI * 0.34, sw: 0.4 }, { oX: 2, oY: 50, l: 19, w: 6, a: -Math.PI * 0.41, sw: 1.1 }]
            },
            { getX: () => MX + W * 0.02, getY: () => MY - H * 0.3, scale: 0.34, bloomDelay: 140, stemLen: 68,
              layers: [
                { count: 6, lenBase: 98, wid: 26, c1: '#38bdf8', c2: '#0ea5e9', offset: 0 },
                { count: 5, lenBase: 68, wid: 18, c1: '#7dd3fc', c2: '#38bdf8', offset: Math.PI / 6 },
                { count: 4, lenBase: 44, wid: 12, c1: '#bae6fd', c2: '#7dd3fc', offset: 0 },
                { count: 4, lenBase: 26, wid: 8, c1: '#e0f2fe', c2: '#bae6fd', offset: Math.PI / 8 },
              ], glow: '224,242,254', glow2: '186,230,253', glow3: '56,189,248', dot: '224,242,254',
              leaves: [{ oX: -2, oY: 38, l: 24, w: 8, a: Math.PI * 0.37, sw: 0.6 }, { oX: 2, oY: 50, l: 18, w: 6, a: -Math.PI * 0.39, sw: 1.3 }]
            },
            { getX: () => MX - W * 0.05, getY: () => MY + H * 0.32, scale: 0.3, bloomDelay: 220, stemLen: 60,
              layers: [
                { count: 6, lenBase: 92, wid: 24, c1: '#fb923c', c2: '#f97316', offset: 0 },
                { count: 5, lenBase: 64, wid: 16, c1: '#fdba74', c2: '#fb923c', offset: Math.PI / 5 },
                { count: 4, lenBase: 42, wid: 11, c1: '#fed7aa', c2: '#fdba74', offset: 0 },
                { count: 4, lenBase: 24, wid: 7, c1: '#ffedd5', c2: '#fed7aa', offset: Math.PI / 7 },
              ], glow: '255,237,213', glow2: '254,215,170', glow3: '251,146,60', dot: '255,237,213',
              leaves: [{ oX: -2, oY: 34, l: 22, w: 7, a: Math.PI * 0.35, sw: 0.5 }, { oX: 2, oY: 46, l: 17, w: 6, a: -Math.PI * 0.43, sw: 1.0 }]
            },
            { getX: () => MX + W * 0.38, getY: () => MY - H * 0.08, scale: 0.28, bloomDelay: 170, stemLen: 55,
              layers: [
                { count: 5, lenBase: 88, wid: 22, c1: '#34d399', c2: '#10b981', offset: 0 },
                { count: 5, lenBase: 60, wid: 15, c1: '#6ee7b7', c2: '#34d399', offset: Math.PI / 5 },
                { count: 4, lenBase: 38, wid: 10, c1: '#a7f3d0', c2: '#6ee7b7', offset: 0 },
                { count: 4, lenBase: 22, wid: 7, c1: '#d1fae5', c2: '#a7f3d0', offset: Math.PI / 8 },
              ], glow: '209,250,229', glow2: '167,243,208', glow3: '52,211,153', dot: '209,250,229',
              leaves: [{ oX: -2, oY: 32, l: 20, w: 6, a: Math.PI * 0.36, sw: 0.8 }, { oX: 2, oY: 42, l: 15, w: 5, a: -Math.PI * 0.4, sw: 1.5 }]
            }
        ];

        function drawOneFlower(f, gt) {
            const fx = f.getX(), fy = f.getY(), s = f.scale;
            const lt = Math.max(0, gt - f.bloomDelay);
            const prog = Math.min(lt / BLOOM_FRAMES, 1);
            const p = easeIO(prog);
            if (p <= 0) return;

            // stem
            drawStemF(fx, fy + 20 * s, f.stemLen * s * p, p);

            // leaves
            if (p > 0.3) {
                const la = (p - 0.3) / 0.7;
                f.leaves.forEach(lf => {
                    drawLeafF(fx + lf.oX * s, fy + lf.oY * s, lf.l * s * la, lf.w * s * la,
                        lf.a + Math.sin(gt * 0.02 + lf.sw) * 0.03, la);
                });
            }

            if (p < 0.15) return;
            const fe = (p - 0.15) / 0.85;

            // petals
            f.layers.forEach((layer, li) => {
                const ld = li * 0.18;
                const lp = Math.max(0, Math.min(1, (fe - ld) / (1 - ld)));
                const eL = easeIO(lp);
                if (eL <= 0) return;
                for (let i = 0; i < layer.count; i++) {
                    const angle = (i / layer.count) * Math.PI * 2 + layer.offset + gt * 0.003 * (li % 2 === 0 ? 1 : -1);
                    drawPetal(fx, fy, layer.lenBase * s * eL, layer.wid * s * eL, angle, layer.c1, layer.c2, eL * 0.92);
                }
            });

            // center glow
            if (fe > 0.3) {
                const ga = (fe - 0.3) / 0.7;
                const pulse = 1 + Math.sin(gt * 0.06) * 0.08;
                const R = 30 * s * ga * pulse;
                const rg = flX.createRadialGradient(fx, fy, 0, fx, fy, R);
                rg.addColorStop(0, `rgba(${f.glow},${ga * 0.98})`);
                rg.addColorStop(0.4, `rgba(${f.glow2},${ga * 0.8})`);
                rg.addColorStop(0.75, `rgba(${f.glow3},${ga * 0.4})`);
                rg.addColorStop(1, `rgba(${f.glow3},0)`);
                flX.beginPath();
                flX.arc(fx, fy, R, 0, Math.PI * 2);
                flX.fillStyle = rg;
                flX.fill();
                const dc = Math.round(8 * s) || 4;
                for (let i = 0; i < dc; i++) {
                    const a = (i / dc) * Math.PI * 2 + gt * 0.04;
                    const r = 12 * s * ga * pulse;
                    flX.beginPath();
                    flX.arc(fx + Math.cos(a) * r, fy + Math.sin(a) * r, 2 * s * ga, 0, Math.PI * 2);
                    flX.fillStyle = `rgba(${f.dot},${ga * 0.9})`;
                    flX.fill();
                }
            }
        }

        let bT = 0;
        (function bgLoop() {
            bT++;
            bgX.fillStyle = '#07040f';
            bgX.fillRect(0, 0, W, H);
            const rg = bgX.createRadialGradient(MX, MY, 0, MX, MY, Math.min(W, H) * 0.5);
            rg.addColorStop(0, 'rgba(90,30,140,0.20)');
            rg.addColorStop(0.5, 'rgba(50,10,90,0.08)');
            rg.addColorStop(1, 'rgba(0,0,0,0)');
            bgX.fillStyle = rg;
            bgX.fillRect(0, 0, W, H);

            // Draw flowers
            flX.clearRect(0, 0, W, H);
            FLOWERS.forEach(f => drawOneFlower(f, bT));

            spX.clearRect(0, 0, W, H);
            sparks.forEach(s => {
                s.angle += s.drift;
                const tw = 0.5 + 0.5 * Math.sin(bT * s.ts + s.to);
                spX.beginPath();
                spX.arc(MX + Math.cos(s.angle) * s.dist, MY + Math.sin(s.angle) * s.dist, s.r * tw, 0, Math.PI * 2);
                spX.fillStyle = hexA(s.col, s.op * (0.35 + 0.65 * tw));
                spX.fill();
            });
            requestAnimationFrame(bgLoop);
        })();

        // ══════════════════════════════════════
        //  LETTER RENDERING
        // ══════════════════════════════════════
        const card = document.getElementById('letter-card');
        const dotsEl = document.getElementById('dots');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        let current = 0;

        function buildCard(page) {
            card.innerHTML = `
    <div class="letter-meta">
      <span class="letter-tag">${page.tag}</span>
      <span class="letter-date">${page.date}</span>
    </div>
    <p class="letter-salutation">${page.salutation}</p>
    <p class="letter-body">${page.body}</p>
    <div class="letter-closing">
      <p>${page.closing}</p>
      <p class="sig">${page.sig}</p>
    </div>
    <div class="deco-heart">♡</div>
  `;
        }

        function renderDots() {
            dotsEl.innerHTML = '';
            PAGES.forEach((_, i) => {
                const d = document.createElement('span');
                d.className = 'dot' + (i === current ? ' active' : '');
                d.addEventListener('click', () => goTo(i));
                dotsEl.appendChild(d);
            });
        }

        function updateBtns() {
            prevBtn.disabled = false; // page 0 prev → flower.html
            nextBtn.disabled = current === PAGES.length - 1;
        }

        function goTo(index, dir = 1) {
            if (index < 0) { window.location.href = 'index.html?slide=1'; return; }
            if (index >= PAGES.length || index === current) return;

            const outCls = dir > 0 ? 'out' : 'out-rev';

            card.classList.add(outCls);
            setTimeout(() => {
                card.classList.remove(outCls);
                current = index;
                buildCard(PAGES[current]);
                renderDots();
                updateBtns();
                card.scrollTop = 0;
                // tiny reflow then fade in via CSS default state
            }, 260);
        }

        prevBtn.addEventListener('click', () => goTo(current - 1, -1));
        nextBtn.addEventListener('click', () => goTo(current + 1, 1));

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') goTo(current + 1, 1);
            if (e.key === 'ArrowLeft') goTo(current - 1, -1);
        });

        let tsx = 0;
        document.addEventListener('touchstart', e => { tsx = e.changedTouches[0].screenX; }, { passive: true });
        document.addEventListener('touchend', e => {
            const diff = tsx - e.changedTouches[0].screenX;
            if (Math.abs(diff) > 50) goTo(diff > 0 ? current + 1 : current - 1, diff > 0 ? 1 : -1);
        }, { passive: true });

        // init
        buildCard(PAGES[0]);
        renderDots();
        updateBtns();

        // Resume background music if it was playing
        const savedTime = sessionStorage.getItem('musicTime');
        if (savedTime) {
            window.bgMusic = new Audio('music.mp3');
            window.bgMusic.loop = true;
            window.bgMusic.currentTime = parseFloat(savedTime);
            window.bgMusic.play().catch(e => console.log('Autoplay blocked:', e));

            // Save music time before navigating away
            window.addEventListener('beforeunload', () => {
                sessionStorage.setItem('musicTime', window.bgMusic.currentTime);
            });
        }
    </script>
</body>
