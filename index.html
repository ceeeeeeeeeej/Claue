<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>To Akane — A Letter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital@0;1&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: #07040f;
      overflow: hidden;
      touch-action: none;
      font-family: 'Inter', sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    canvas.flower-visible {
      opacity: 1;
    }

    /* ── Nav bar ── */
    .nav {
      position: fixed;
      bottom: 1.8rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(10, 4, 20, 0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(192, 132, 252, 0.22);
      border-radius: 60px;
      padding: 0.58rem 1.3rem;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.55), 0 0 40px rgba(192, 132, 252, 0.12);
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 0.38rem;
      background: none;
      border: none;
      color: #9a89b4;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.38rem 0.6rem;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-btn svg {
      width: 16px;
      height: 16px;
    }

    .nav-btn:hover {
      color: #c084fc;
      background: rgba(192, 132, 252, 0.10);
    }

    .nav-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      background: none;
    }

    /* ── Dots ── */
    .slide-dots {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #9a89b4;
      opacity: 0.35;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.3s, background 0.3s;
    }

    .dot.dot-active {
      opacity: 1;
      background: #c084fc;
      transform: scale(1.5);
      box-shadow: 0 0 10px #c084fc;
    }

    /* ── Slide caption overlay ── */
    #slide-caption {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.35s ease, top 0.5s ease, bottom 0.5s ease, transform 0.5s ease;
    }

    #slide-caption.hidden {
      opacity: 0;
    }

    /* When on the flower slide — anchor near the stem root */
    #slide-caption.flower-mode {
      top: calc(50% + 180px);
      bottom: auto;
      transform: translateX(-50%);
    }

    .caption-card {
      display: inline-block;
      background: rgba(10, 4, 20, 0.72);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(192, 132, 252, 0.22);
      border-radius: 18px;
      padding: 1.4rem 2rem;
      box-shadow: 0 0 60px rgba(192, 132, 252, 0.15), 0 16px 50px rgba(0, 0, 0, 0.5);
      max-width: min(480px, 88vw);
    }

    .caption-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #c084fc;
      margin-bottom: 0.7rem;
      font-weight: 500;
    }

    .caption-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2.4vw, 1.15rem);
      line-height: 1.9;
      color: #f0e8ff;
      white-space: pre-wrap;
    }

    /* flower-only slide: glowing caption */
    .flower-caption {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.8vw, 1.4rem);
      color: #f9a8d4;
      letter-spacing: 0.07em;
      text-shadow: 0 0 30px rgba(249, 168, 212, 0.75), 0 0 60px rgba(192, 132, 252, 0.4);
      animation: cap-pulse 3s ease-in-out infinite;
    }

    @keyframes cap-pulse {

      0%,
      100% {
        opacity: 0.8;
      }

      50% {
        opacity: 1;
      }
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .nav {
        gap: 0.7rem;
        padding: 0.5rem 0.9rem;
        bottom: 1.2rem;
      }

      .nav-btn {
        font-size: 0.72rem;
        padding: 0.35rem 0.45rem;
      }

      .slide-dots {
        gap: 6px;
      }

      #slide-caption {
        width: 90vw;
      }

      .caption-card {
        padding: 1.2rem 1.5rem;
      }

      .caption-text {
        font-size: clamp(0.85rem, 3.5vw, 1.05rem);
      }

      .flower-caption {
        font-size: clamp(0.9rem, 4vw, 1.2rem);
      }
    }

    @media (max-width: 480px) {
      .nav {
        gap: 0.4rem;
        padding: 0.4rem 0.7rem;
        bottom: 0.9rem;
      }

      .nav-btn {
        font-size: 0.65rem;
        gap: 0.2rem;
        padding: 0.3rem 0.35rem;
      }

      .nav-btn svg {
        width: 13px;
        height: 13px;
      }

      .slide-dots {
        gap: 5px;
      }

      .dot {
        width: 5px;
        height: 5px;
      }

      #slide-caption {
        width: 95vw;
        bottom: 4.5rem;
      }

      .caption-card {
        padding: 1rem 1.2rem;
        border-radius: 14px;
      }

      .caption-label {
        font-size: 0.62rem;
      }

      .caption-text {
        font-size: 0.88rem;
        line-height: 1.8;
      }

      .flower-caption {
        font-size: 0.95rem;
      }
    }

    @media (max-width: 360px) {
      .nav {
        gap: 0.25rem;
        padding: 0.35rem 0.55rem;
      }

      .nav-btn {
        font-size: 0.6rem;
      }

      .caption-card {
        padding: 0.9rem 1rem;
      }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      #slide-caption {
        bottom: 3.5rem;
      }

      .caption-card {
        padding: 0.8rem 1.2rem;
      }

      .nav {
        bottom: 0.5rem;
      }
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <script>
    // ── Digital Flower Canvas ──
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, cx, cy;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cx = W / 2; cy = H / 2;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Particles ──
    const particles = [];
    for (let i = 0; i < 120; i++) {
      particles.push({
        x: Math.random() * 2000 - 1000,
        y: Math.random() * 2000 - 1000,
        r: Math.random() * 2 + 0.5,
        speed: Math.random() * 0.3 + 0.1,
        angle: Math.random() * Math.PI * 2,
        opacity: Math.random() * 0.7 + 0.2,
        color: ['#f9a8d4', '#c084fc', '#818cf8', '#fbcfe8', '#e879f9'][Math.floor(Math.random() * 5)]
      });
    }

    // ── Petal drawing ──
    function drawPetal(ctx, x, y, len, wid, angle, color1, color2, alpha) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      const grad = ctx.createLinearGradient(0, 0, 0, len);
      grad.addColorStop(0, color1.replace(')', `,${alpha})`).replace('rgb', 'rgba'));
      grad.addColorStop(1, color2.replace(')', `,0)`).replace('rgb', 'rgba'));

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(wid, len * 0.25, wid, len * 0.75, 0, len);
      ctx.bezierCurveTo(-wid, len * 0.75, -wid, len * 0.25, 0, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    }

    function drawPetalSimple(cx, cy, len, wid, angle, c1, c2, alpha) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      const grad = ctx.createLinearGradient(0, 0, 0, len);
      grad.addColorStop(0, hexAlpha(c1, alpha));
      grad.addColorStop(1, hexAlpha(c2, 0));
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(wid, len * 0.25, wid * 1.1, len * 0.65, 0, len);
      ctx.bezierCurveTo(-wid * 1.1, len * 0.65, -wid, len * 0.25, 0, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      // shimmer line
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(wid * 0.15, len * 0.5, 0, len);
      ctx.strokeStyle = hexAlpha('#ffffff', alpha * 0.18);
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }

    function hexAlpha(hex, a) {
      let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${a})`;
    }

    // ── Leaf ──
    function drawLeaf(cx, cy, len, wid, angle, alpha) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      const grad = ctx.createLinearGradient(0, 0, 0, len);
      grad.addColorStop(0, `rgba(110,231,183,${alpha})`);
      grad.addColorStop(0.5, `rgba(52,211,153,${alpha * 0.8})`);
      grad.addColorStop(1, `rgba(16,185,129,0)`);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(wid, len * 0.3, wid * 0.8, len * 0.7, 0, len);
      ctx.bezierCurveTo(-wid * 0.8, len * 0.7, -wid, len * 0.3, 0, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    }

    // ── Stem ──
    function drawStem(cx, cy, len, alpha) {
      const grad = ctx.createLinearGradient(cx, cy, cx, cy + len);
      grad.addColorStop(0, `rgba(52,211,153,${alpha})`);
      grad.addColorStop(1, `rgba(16,185,129,${alpha * 0.3})`);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.quadraticCurveTo(cx - 18, cy + len * 0.55, cx - 8, cy + len);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 4 * alpha;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // ── Bloom animation state ──
    let t = 0;
    const BLOOM_DURATION = 240; // frames

    // ── Flower configurations ──
    // Each flower: { x, y (functions of cx/cy), scale, petalLayers, bloomDelay, stemLen, stemCurve }

      {
        // Main center flower (original)
        getX: () => cx,
        getY: () => cy,
        scale: 1,
        bloomDelay: 0,
        stemLen: 140,
        layers: [
          { count: 8, lenBase: 130, wid: 36, c1: '#e879f9', c2: '#c084fc', offset: 0 },
          { count: 7, lenBase: 100, wid: 28, c1: '#f9a8d4', c2: '#e879f9', offset: Math.PI / 8 },
          { count: 6, lenBase: 68, wid: 20, c1: '#fde68a', c2: '#f9a8d4', offset: 0 },

        glowColor1: '255,255,220',

        ],
        glowColor1: '237,233,254',

        glowColor3: '129,140,248',

        leaves: [

        ]
      },
      {

        getX: () => cx + W * 0.25,

      {

        getX: () => cx + W * 0.02,

        ],

        leaves: [

        ]
      },
      {
        // Flower 9 — bottom center, peach-salmon tones
        getX: () => cx - W * 0.05,

        scale: 0.3,

        layers: [
          { count: 6, lenBase: 92, wid: 24, c1: '#fb923c', c2: '#f97316', offset: 0 },
          { count: 5, lenBase: 64, wid: 16, c1: '#fdba74', c2: '#fb923c', offset: Math.PI / 5 },
          { count: 4, lenBase: 42, wid: 11, c1: '#fed7aa', c2: '#fdba74', offset: 0 },
          { count: 4, lenBase: 24, wid: 7, c1: '#ffedd5', c2: '#fed7aa', offset: Math.PI / 7 },
        ],
        glowColor1: '255,237,213',
        glowColor2: '254,215,170',
        glowColor3: '251,146,60',
        centerDotColor: '255,237,213',
        leaves: [
          { offX: -2, offY: 34, len: 22, wid: 7, angle: Math.PI * 0.35, sway: 0.5 },

        ]
      },
      {
        // Flower 10 — far right mid, mint-emerald tones
        getX: () => cx + W * 0.38,

        scale: 0.28,
        bloomDelay: 170,
        stemLen: 55,
        layers: [
          { count: 5, lenBase: 88, wid: 22, c1: '#34d399', c2: '#10b981', offset: 0 },
          { count: 5, lenBase: 60, wid: 15, c1: '#6ee7b7', c2: '#34d399', offset: Math.PI / 5 },
          { count: 4, lenBase: 38, wid: 10, c1: '#a7f3d0', c2: '#6ee7b7', offset: 0 },
          { count: 4, lenBase: 22, wid: 7, c1: '#d1fae5', c2: '#a7f3d0', offset: Math.PI / 8 },
        ],
        glowColor1: '209,250,229',
        glowColor2: '167,243,208',
        glowColor3: '52,211,153',
        centerDotColor: '209,250,229',
        leaves: [
          { offX: -2, offY: 32, len: 20, wid: 6, angle: Math.PI * 0.36, sway: 0.8 },
          { offX: 2, offY: 42, len: 15, wid: 5, angle: -Math.PI * 0.4, sway: 1.5 },
        ]
      }
    ];

    function drawSingleFlower(flower, globalTime) {
      const fx = flower.getX();
      const fy = flower.getY();
      const s = flower.scale;
      const localT = Math.max(0, globalTime - flower.bloomDelay);
      const progress = Math.min(localT / BLOOM_DURATION, 1);
      const p = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;

      if (p <= 0) return;

      // stem
      drawStem(fx, fy + 20 * s, flower.stemLen * s * p, p);

      // leaves
      if (p > 0.3) {
        const la = (p - 0.3) / 0.7;
        flower.leaves.forEach(leaf => {
          drawLeaf(
            fx + leaf.offX * s,
            fy + leaf.offY * s,
            leaf.len * s * la,
            leaf.wid * s * la,
            leaf.angle + Math.sin(globalTime * 0.02 + leaf.sway) * 0.03,
            la
          );
        });
      }

      if (p < 0.15) return;
      const fe = (p - 0.15) / 0.85;

      // petal layers
      flower.layers.forEach((layer, li) => {
        const layerDelay = li * 0.18;
        const lp = Math.max(0, Math.min(1, (fe - layerDelay) / (1 - layerDelay)));
        const eL = lp < 0.5 ? 2 * lp * lp : -1 + (4 - 2 * lp) * lp;
        if (eL <= 0) return;
        for (let i = 0; i < layer.count; i++) {
          const angle = (i / layer.count) * Math.PI * 2 + layer.offset + globalTime * 0.003 * (li % 2 === 0 ? 1 : -1);
          const len = layer.lenBase * s * eL;
          const wid = layer.wid * s * eL;
          drawPetalSimple(fx, fy, len, wid, angle, layer.c1, layer.c2, eL * 0.92);
        }
      });

      // center glow
      if (fe > 0.3) {
        const ga = (fe - 0.3) / 0.7;
        const pulse = 1 + Math.sin(globalTime * 0.06) * 0.08;
        const glowR = 30 * s * ga * pulse;
        const rg = ctx.createRadialGradient(fx, fy, 0, fx, fy, glowR);
        rg.addColorStop(0, `rgba(${flower.glowColor1},${ga * 0.98})`);
        rg.addColorStop(0.4, `rgba(${flower.glowColor2},${ga * 0.8})`);
        rg.addColorStop(0.75, `rgba(${flower.glowColor3},${ga * 0.4})`);
        rg.addColorStop(1, `rgba(${flower.glowColor3},0)`);
        ctx.beginPath();
        ctx.arc(fx, fy, glowR, 0, Math.PI * 2);
        ctx.fillStyle = rg;
        ctx.fill();

        // center dots
        const dotCount = Math.round(8 * s) || 4;
        for (let i = 0; i < dotCount; i++) {
          const a = (i / dotCount) * Math.PI * 2 + globalTime * 0.04;
          const r = 12 * s * ga * pulse;
          ctx.beginPath();
          ctx.arc(fx + Math.cos(a) * r, fy + Math.sin(a) * r, 2 * s * ga, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${flower.centerDotColor},${ga * 0.9})`;
          ctx.fill();
        }
      }
    }

    function drawAllFlowers() {
      FLOWERS.forEach(flower => drawSingleFlower(flower, t));
    }

    // ── glow background ──
    function drawBackground() {
      // deep dark bg
      ctx.fillStyle = '#07040f';
      ctx.fillRect(0, 0, W, H);

      // soft center radial glow
      const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 340);
      rg.addColorStop(0, 'rgba(120,60,180,0.18)');
      rg.addColorStop(0.5, 'rgba(80,20,120,0.08)');
      rg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);
    }

    // ── particles ──
    function drawParticles() {
      particles.forEach(p => {
        p.angle += p.speed * 0.01;
        const dist = Math.sqrt(p.x * p.x + p.y * p.y);
        const spiral = 0.002 / Math.max(dist, 50);
        p.angle += spiral;
        p.x = Math.cos(p.angle) * dist + Math.cos(t * p.speed * 0.1) * 0.5;
        p.y = Math.sin(p.angle) * dist + Math.sin(t * p.speed * 0.1) * 0.5;
        // drift inward slowly
        const nx = p.x * 0.9998, ny = p.y * 0.9998;
        if (Math.abs(nx) < 2 && Math.abs(ny) < 2) {
          p.x = Math.random() * 800 - 400;
          p.y = Math.random() * 800 - 400;
        } else { p.x = nx; p.y = ny; }
        ctx.beginPath();
        ctx.arc(cx + p.x, cy + p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + Math.floor(p.opacity * 255).toString(16).padStart(2, '0');
        ctx.fill();
      });
    }

    // ── aura rings ──
    function drawAura() {
      FLOWERS.forEach(flower => {
        const fx = flower.getX();
        const fy = flower.getY();
        const s = flower.scale;
        const localT = Math.max(0, t - flower.bloomDelay);
        const progress = Math.min(localT / BLOOM_DURATION, 1);
        if (progress < 0.3) return;
        const a = (progress - 0.3) / 0.7;
        for (let i = 0; i < 3; i++) {
          const phase = t * 0.015 + i * (Math.PI * 2 / 3);
          const r = (90 + i * 30) * s + Math.sin(phase) * 6 * s;
          ctx.beginPath();
          ctx.arc(fx, fy, r * Math.min(a * 2, 1), 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(192,132,252,${0.06 * a * s})`;
          ctx.lineWidth = (i === 0 ? 2 : 1) * s;
          ctx.stroke();
        }
      });
    }

    // ── main loop ──
    let flowerActive = false;

    function loop() {
      if (flowerActive) t++;
      drawBackground();
      drawParticles();
      drawAura();
      drawAllFlowers();
      requestAnimationFrame(loop);
    }
    loop();
  </script>

  <!-- Caption overlay -->
  <div id="slide-caption"></div>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <button class="nav-btn" id="prev-btn" aria-label="Previous slide">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      prev
    </button>

    <div class="slide-dots" id="slide-dots"></div>

    <button class="nav-btn" id="next-btn" aria-label="Next slide">
      next
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </nav>

  <script>
    // ═══════════════════════════════════════
    //  SLIDE DATA  — add more objects here!
    // ═══════════════════════════════════════
    const SLIDES = [
      {
        type: 'message',
        label: 'a little something',
        text: 'Hello!\nCLAUE LEANNE\n\n Letter for you'
      },
      { type: 'flower' },   // slide 1: just the flower + caption
      // Add more slides here:
      // { type: 'message', label: 'page 2', text: 'your text here' },
    ];

    let current = 0;

    const captionEl = document.getElementById('slide-caption');
    const dotsEl = document.getElementById('slide-dots');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    function renderCaption(slide) {
      captionEl.classList.add('hidden');
      setTimeout(() => {
        captionEl.innerHTML = '';
        if (slide.type === 'flower') {
          captionEl.classList.add('flower-mode');
          const p = document.createElement('p');
          p.className = 'flower-caption';
          p.textContent = ' Sige repost pa, Claue!\u2661';
          captionEl.appendChild(p);
        } else {
          captionEl.classList.remove('flower-mode');
          const card = document.createElement('div');
          card.className = 'caption-card';
          if (slide.label) {
            const lbl = document.createElement('p');
            lbl.className = 'caption-label';
            lbl.textContent = slide.label;
            card.appendChild(lbl);
          }
          const txt = document.createElement('p');
          txt.className = 'caption-text';
          txt.textContent = slide.text || '';
          card.appendChild(txt);
          captionEl.appendChild(card);
        }
        captionEl.classList.remove('hidden');
      }, 200);
    }

    function renderDots() {
      dotsEl.innerHTML = '';
      SLIDES.forEach((_, i) => {
        const d = document.createElement('span');
        d.className = 'dot' + (i === current ? ' dot-active' : '');
        d.addEventListener('click', () => goTo(i));
        dotsEl.appendChild(d);
      });
    }

    function updateBtns() {
      prevBtn.disabled = current === 0;
      // On last slide, next navigates to message.html — keep it enabled
      nextBtn.disabled = false;
      // Update next button label
      const nextLabel = nextBtn.querySelector('span.next-label');
      if (nextLabel) {
        nextLabel.textContent = current === SLIDES.length - 1 ? 'open' : 'next';
      }
    }

    function goTo(index) {
      if (index === current || index < 0 || index >= SLIDES.length) return;
      current = index;
      const slide = SLIDES[current];

      if (!window.bgMusic) {
        window.bgMusic = new Audio('music.mp3');
        window.bgMusic.loop = true;
        // Restore time if coming back from message.html
        const savedTime = sessionStorage.getItem('musicTime');
        if (savedTime) window.bgMusic.currentTime = parseFloat(savedTime);
      }

      if (slide.type === 'flower') {
        // Reset bloom and fade the canvas in
        t = 0;
        flowerActive = true;
        // Small delay so the fade-in starts after caption swap begins
        setTimeout(() => canvas.classList.add('flower-visible'), 80);

        // Play music when flower appears
        window.bgMusic.play().catch(e => console.log('Autoplay blocked:', e));
      } else {
        // Fade canvas out and pause bloom
        canvas.classList.remove('flower-visible');
        flowerActive = false;
        // Reset so next flower visit blooms fresh
        t = 0;

        // Pause music if we go back to the first slide
        if (window.bgMusic) window.bgMusic.pause();
      }

      // Save music time before navigating away
      window.addEventListener('beforeunload', () => {
        if (window.bgMusic) {
          sessionStorage.setItem('musicTime', window.bgMusic.currentTime);
        }
      });

      renderCaption(slide);
      renderDots();
      updateBtns();
    }

    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => {
      if (current === SLIDES.length - 1) {
        // Last slide — navigate to message.html
        window.location.href = 'message.html';
      } else {
        goTo(current + 1);
      }
    });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
    });

    // Swipe
    let tsx = 0;
    document.addEventListener('touchstart', e => { tsx = e.changedTouches[0].screenX; }, { passive: true });
    document.addEventListener('touchend', e => {
      const diff = tsx - e.changedTouches[0].screenX;
      if (Math.abs(diff) > 50) goTo(diff > 0 ? current + 1 : current - 1);
    }, { passive: true });

    // Init
    const params = new URLSearchParams(window.location.search);
    const startSlide = parseInt(params.get('slide'), 10) || 0;
    if (startSlide > 0 && startSlide < SLIDES.length) {
      goTo(startSlide);
    } else {
      renderCaption(SLIDES[0]);
      renderDots();
      updateBtns();
    }
  </script>
</body>
